# Pi 5 + Intel BE200 M.2 (Wi-Fi 7) — Alpine edge for iwlwifi.
#
# Confirmed via apk inspection 2026-05-25: edge's linux-rpi-6.12.85
# ships `iwlwifi.ko` + iwldvm + iwlmvm in the modloop; stable 3.21's
# linux-rpi-6.12.13 does NOT (entire wireless/intel/ subtree absent
# despite bcm2711_defconfig having CONFIG_IWLWIFI=m). Edge also has
# the BE200 firmware (iwlwifi-gl-c0-fm-c0-* + iwlwifi-sc-a0-fm-c0-*)
# in linux-firmware-intel.
#
# Trade-off: edge is a rolling release — package APIs can shift
# week-to-week. For an appliance NEEDING an edge-only kernel feature
# the cost is unavoidable; reproducibility is reclaimed by pinning
# the snapshot at bake time (today: stable tarball + edge repos,
# the bake captures both versions in /etc/apk/repositories).
#
# See `§30 fw-be200` in totaldns/FEATURES-TODO.md for the full
# decision tree (Alpine edge vs RPi OS vs custom kernel vs USB AP).

hostname: td-pi5-1
board: pi-5
os: alpine
os_version: edge

ssh_pubkey: ~/.ssh/totaldns-adhoc.pub

network:
  mode: dhcp
  send_hostname: true

packages:
  - avahi
  - avahi-tools
  - dbus
  - py3-pydbus
  - linux-firmware-intel   # BE200 firmware blobs

output:
  path: ~/sdcards/td-pi5-1.img.gz
