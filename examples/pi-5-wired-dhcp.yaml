# Pi 5 (aarch64) — wired eth0 via DHCP. Stock stable Alpine.
#
# Used as the §25 hardware lab's totaldns-server platform. eth0 = WAN
# (DHCP from upstream router); LAN-AP later via wlan0 (built-in
# brcmfmac) or an external USB/M.2 radio.
#
# Packages: avahi gives the operator `https://pi5-wired.local:8443/`
# IP-agnostic reachability — pretty much essential for an appliance
# whose IP can change each cold boot. Currently requires network on
# first boot (not in stock /apks cache); bake-time cache enrichment
# is a v0.3 ROADMAP item.

hostname: pi5-wired
board: pi-5
os: alpine

ssh_pubkey: ~/.ssh/*.pub

network:
  mode: dhcp
  send_hostname: true

packages:
  - avahi
  - avahi-tools
  - dbus
  - py3-pydbus

output:
  path: pi5-wired.img.gz
