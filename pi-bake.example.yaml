# pi-bake.example.yaml — annotated reference for `pi-bake build --config`
#
# Every field is documented inline. Operators copy this file as a
# starting point: trim what isn't needed, fill in what is. The
# `examples/` directory has minimal, tested recipes for common
# shapes (wifi-station, wired AP, CAN/RS485) — start there if
# this looks long.
#
# Run:    pi-bake build --config <this-file>
# Or:     pi-bake build --config <this-file> --to-yaml normalized.yaml --no-bake
#         (round-trips through the validator — surfaces schema errors,
#          writes a clean canonical copy)
#
# --------------------------------------------------------------------------
# REQUIRED FIELDS
# --------------------------------------------------------------------------

# DNS-label-safe hostname. Becomes /etc/hostname AND the name the
# device announces via DHCP option 12 (when network.send_hostname).
# Lowercase, digits, hyphens; <=63 chars; no leading/trailing hyphen.
hostname: pi5-wired

# Target board. `pi-bake list-boards` shows the full set.
# Common: pi-5, pi-4, pi-zero-2-w, pi-zero-w, pi-3.
board: pi-5

# OS family. `pi-bake list-os --board <b>` filters by board.
# Today: alpine (fully working), raspbian / debian (v0.2 stubs).
os: alpine

# Where the OpenSSH pubkey comes from. Three forms accepted:
#   - path on the bake host (starts with `~`, `/`, or `./`)
#   - inline ssh-rsa / ssh-ed25519 / ecdsa-sha2-* string
#   - bare filename — read as file if it exists, else error
# Becomes /root/.ssh/authorized_keys (Alpine) with PasswordAuthentication
# disabled in sshd_config. Password login OFF by default — only key
# auth works.
ssh_pubkey: ~/.ssh/*.pub

# Where the .img.gz lands. Operator dd's this to the SD card.
output:
  path: pi5-wired.img.gz
  # Optional. 0 / omitted → backend default (400 MB for Alpine).
  # Bump if you bake huge package sets that don't fit.
  # image_size_mb: 800

# --------------------------------------------------------------------------
# OPTIONAL FIELDS — sensible defaults shown commented out
# --------------------------------------------------------------------------

# OS version. Empty / omitted → latest known-good in the catalog.
#   - alpine: "3.21.4", "3.21.3", "3.20.5", "edge" (ext4 mode only)
#   - raspbian: "bookworm"
#   - debian: "12.7-arm64"
# os_version: 3.21.4

# OS layout. Per-OS allow-list:
#   alpine: diskless (default), ext4, pxe
#   raspbian: "" (SD-card default), pxe
#   debian/fedora: layout fixed by backend; os_mode must be empty.
# Options in detail:
#   - diskless (alpine, default): SD card boot, no sudo, fast first-boot.
#   - ext4 (alpine, v0.3.1+): sys-mode Alpine on a real partitioned image
#     (FAT /boot + ext4 /); requires sudo. Only mode that supports
#     `os_version: edge` — diskless rejects it because Alpine ships
#     no RPi edge tarball and modloop-on-FAT makes post-boot kernel
#     upgrade an awkward ritual.
#   - pxe (alpine, v0.3.2+): produces a TFTP+HTTP boot tree (a directory,
#     not an .img file) for network-boot recovery. No-sudo bake.
#     Operator drops the tree into /var/lib/tftpboot/<mac>/ on the
#     lab host; the same tree gets served over HTTP via nginx (see
#     ngnix_setup.md). Requires `pxe.server_url:` to be set.
#   - pxe (raspbian, v0.6.5+): two-tarball NFS-root bake — a TFTP
#     tarball (kernel + DTBs + initramfs + cmdline.txt) and a rootfs
#     tarball (customized Pi OS Lite /). Requires `pxe.nfs_server:`.
#     See examples/pi-cm4-raspbian-pxe.yaml for the full shape.
# os_mode: ext4

# PXE-mode block. Required when os_mode: pxe — fields are per-os.
#
# Alpine PXE: only server_url applies (apkovl + apks served by nginx).
# pi-bake substitutes server_url into cmdline.txt's `apkovl=` and
# `alpine_repo=` params. Must NOT include the apks/<arch> suffix —
# apk appends `/<arch>/APKINDEX.tar.gz` itself. See
# examples/pi-cm4-alpine-pxe.yaml.
#
# Raspbian PXE: nfs_server is required; nfs_mount_options and
# nfs_push are optional. See examples/pi-cm4-raspbian-pxe.yaml.
#   - nfs_server: <host>[:<port>]:<path> — NFS export the Pi mounts
#     as rootfs. Port is optional (defaults to standard 2049).
#   - nfs_mount_options: extras appended to cmdline.txt's nfsroot=
#     (e.g. "vers=3,proto=tcp,mountport=8803,nolock" — common when
#     pointing at unfs3 behind an incus port-forward proxy).
#   - nfs_push: OPTIONAL deploy hint. pi-bake never auto-pushes,
#     but if set, DEPLOY.md gets the matching command pre-filled:
#       incus:<container-name>     → `incus file push ...`
#       ssh://<user>@<host>:<port> → `scp ...`
# pxe:
#   server_url: http://192.168.4.2/cm4-lab           # alpine only
#   nfs_server: 192.168.4.2:8801:/srv/nfs/pi-bake/cm4-pxe   # raspbian only
#   nfs_mount_options: vers=3,proto=tcp,mountport=8803,nolock  # raspbian
#   nfs_push: incus:nfs-pi-bake                      # raspbian, optional

# IANA timezone. Default UTC. Some clocks (Pi has no RTC) come up
# at 1970-01-01 anyway until chrony syncs — this is only the
# permanent setting for /etc/timezone + /etc/localtime symlink.
# timezone: America/New_York

# glibc locale, e.g. `en_US.UTF-8`, `de_DE.UTF-8`, `ja_JP.UTF-8`.
# Default `en_GB.UTF-8` — matches Pi OS Lite's shipped default, no
# surprise change. Only the encoding (UTF-8) matters for most CLI
# work; the en_US vs en_GB choice is cosmetic unless you care
# about date formats / number separators / etc. On first boot
# pi-bake's firstrun.sh uncomments the locale in /etc/locale.gen,
# runs locale-gen to compile it, and sets LANG via update-locale.
# locale: en_US.UTF-8

# Additional authorized_keys entries beyond ssh_pubkey above. Same
# three-form resolution (path / inline / bare filename).
# extra_pubkeys:
#   - ~/.ssh/operator-laptop.pub
#   - "ssh-ed25519 AAAA... pyinfra@runner"

# Operator-named primary login user. Replaces the default `pi`
# user (Raspbian) when set. Modern security practice: well-known
# default usernames are attack-targets; a named user is less
# guess-prone. firstrun.sh creates the user with bash shell + the
# listed groups + your authorized_keys + a locked random password
# (key auth only). When set, the legacy `/ssh` and
# `/userconf.txt` markers are also skipped — the `pi` user is
# never created.
#
# Raspbian-only for v0.6.x. Alpine bakes silently ignore the
# block (Alpine's convention is root-as-operator; named-user
# support for Alpine is a future enhancement).
#
# TWO FORMS — pick whichever fits:
#
# (a) `user:` singular — one operator-named user, uses the
#     top-level `ssh_pubkey` + `extra_pubkeys` above. Required:
#     `name` (Unix login-name format). Optional: `groups`
#     (defaults to the same set Pi OS gives `pi`), `shell`
#     (defaults to /bin/bash).
# user:
#   name: kurt
#   groups: [sudo, video, audio, plugdev, gpio, i2c, spi]
#   shell: /bin/bash
#
# (b) `users:` plural (v0.6.1+) — multiple users, with optional
#     per-user `ssh_pubkey:` / `extra_pubkeys:` overrides. Useful
#     for multi-operator labs (alice + bob with different
#     laptop keys) or service accounts. Per-user `ssh_pubkey`
#     REPLACES the top-level set for that user. Per-user
#     `extra_pubkeys` (without `ssh_pubkey`) COMPOSE on top of
#     the top-level set — additive.
# users:
#   - name: alice
#     groups: [sudo, docker]
#     ssh_pubkey: ~/.ssh/alice-laptop.pub
#   - name: bob
#     groups: [users, video]
#     # no ssh_pubkey -> inherits top-level
#   - name: monitoring
#     shell: /usr/sbin/nologin
#     ssh_pubkey: monitoring-bot-key.pub

# dtparam shortcuts. Each entry becomes a `dtparam=<key>=<value>`
# line in /boot/firmware/config.txt (via usercfg.txt include).
# Useful for the hardware-interface toggles Pi OS Bookworm+
# disabled by default — spi, i2c_arm, audio, etc.
#
# YAML's `on` / `off` auto-coerce to booleans; pi-bake normalizes
# them back to the config.txt convention ("on" / "off" strings).
# Numeric values pass through unchanged.
#
# For anything that doesn't fit the dtparam= prefix (enable_uart=1,
# dtoverlay=..., gpu_mem=..., etc.) use `config_txt:` directly
# further below.
# dtparam:
#   spi: on
#   i2c_arm: on
#   audio: on

# Stable SSH host identity. Baked into
# /etc/ssh/ssh_host_<type>_key{,.pub} so the Pi's SSH fingerprint
# stays the same across rebuilds — no "REMOTE HOST IDENTIFICATION
# HAS CHANGED" warnings, no -o StrictHostKeyChecking=no needed.
# Three accepted forms:
#
# 1) PATH to an OpenSSH private key on the bake host; pubkey is
#    read from <path>.pub. Key type is detected from the pubkey
#    (ssh-ed25519 / ssh-rsa / ecdsa-sha2-*). Generate once with:
#      ssh-keygen -t ed25519 -N '' \
#        -f ~/.ssh/pi-host-keys/pi5-wired \
#        -C "host@pi5-wired"
#    then back the directory up. PRODUCTION-SAFE.
#
# 2) `usehost` — derive an ed25519 keypair deterministically from
#    the hostname (SHA-256 KDF). Same hostname -> same key on any
#    bake host, no file to manage. **NOT a SECURE option, use for
#    testing and labs only** — the key is predictable from public
#    info (the hostname), so anyone who can guess the hostname can
#    compute the same private key offline and impersonate / MITM
#    the device. Emits a runtime WARNING at bake time.
#
# 3) `seed:<string>` — derive ed25519 deterministically from the
#    literal string. Useful for an HA pair or fleet-wide shared
#    identity. **NOT a SECURE option, use for testing and labs
#    only** — same caveat: a seed committed to a VCS recipe is
#    public.
#
# Omit to let pi-bake auto-generate a fresh ed25519 pair per bake
# (stable across reflashes of the same .img.gz; changes per build).
# ssh_host_key: ~/.ssh/pi-host-keys/pi5-wired
# ssh_host_key: usehost
# ssh_host_key: seed:fleet-2026-q2

# --------------------------------------------------------------------------
# NETWORK (eth0)
# --------------------------------------------------------------------------
# eth0 config. WiFi is a separate `wifi:` block below.

network:
  # `dhcp` (default): dhcpcd manages eth0. Most flexible.
  # `static`: requires `address` (CIDR) + `gateway` below; dhcpcd
  # is dropped from the runlevel entirely and ifupdown brings eth0
  # up at boot. Use when the upstream LAN doesn't have a DHCP server
  # OR when the appliance needs a stable address known in advance.
  mode: dhcp

  # Static-mode only. CIDR form: `192.168.4.111/24`.
  # address: 192.168.4.111/24
  # gateway: 192.168.4.1

  # dhcp-mode only. When true (default), dhcpcd sends the system
  # hostname in DHCP option 12 on DISCOVER/REQUEST — upstream DHCP
  # server logs + lease tables show "pi5-wired" not "?". Set false
  # to bake an intentional test fixture for DHCP-server-side
  # hostname recovery via mDNS or synthesized placeholder.
  send_hostname: true

# --------------------------------------------------------------------------
# WIFI — bootstrap creds for first-boot auto-join (optional)
# --------------------------------------------------------------------------
# Omit the whole `wifi:` block for wired-only nodes. Generates
# /etc/wpa_supplicant/wpa_supplicant.conf + enables the runlevel.
#
# This is *bootstrap-only*: the goal is to get the Pi reachable
# so the post-boot orchestrator (pyinfra etc.) can configure
# whatever WiFi mode the device actually needs (station, AP,
# multi-BSS, etc.).

# wifi:
#   ssid: totaldns-lab
#   psk: change-me
#   country: US     # regulatory domain — controls available channels

# --------------------------------------------------------------------------
# PACKAGES — extras beyond the stock RPi tarball cache
# --------------------------------------------------------------------------
# apk packages installed on first boot. Two flavors driven by
# `apk_fetch` below:
#
#   apk_fetch: false  (default — online first boot)
#     A `/etc/local.d/install-extras.start` script runs after dhcpcd
#     converges and does `apk add <pkgs>` against upstream Alpine.
#     The Pi MUST reach the internet on first boot. Works fine for
#     a normal LAN-connected deploy.
#
#   apk_fetch: true  (v0.2 — offline first boot, air-gap appliances)
#     pi-bake fetches the package set + recursive deps at BAKE time
#     using apk-tools-static against upstream Alpine, stages the
#     .apk files into the FAT image at
#     `/media/mmcblk0/apks/<arch>/extras/`, and the first-boot
#     script installs them with `apk add --no-network --allow-
#     untrusted`. Device boots fully provisioned with no internet.
#     Bake host needs network + tar + cpio + the ability to
#     download apk-tools-static once.
#
# Stock packages (free to list — already in the FAT cache, no
# fetch needed):
#   alpine-base, openssh-server, openssh-server-common-openrc,
#   openssh-sftp-server, openssh-client-default, dhcpcd,
#   dhcpcd-openrc, chrony, chrony-openrc, wpa_supplicant,
#   wpa_supplicant-openrc, iw, ifupdown-ng-wifi.
#
# Common extras NOT in the stock cache:
#   avahi, avahi-tools, dbus, py3-pydbus  → mDNS bridge
#   linux-firmware-brcm                    → Pi onboard WiFi
#   linux-firmware-intel                   → Intel AX-series iwlwifi

# packages:
#   - avahi
#   - avahi-tools
#   - dbus
#   - py3-pydbus
#   - linux-firmware-brcm

# Bake-time apk-fetch is now ALWAYS-ON when `packages:` is set.
# Every operator-declared package + recursive deps gets pulled from
# upstream Alpine at bake time, dropped into FAT alongside the stock
# cache, indexed + signed, and installed AT INIT TIME from
# /etc/apk/world. Pi never needs internet on first boot; everything
# is in place before sshd starts.
#
# The `apk_fetch:` field below is DEPRECATED — it's silently
# accepted for backward-compat with recipes from earlier versions
# but ignored. Remove it from new recipes.
# apk_fetch: true

# --------------------------------------------------------------------------
# HAT / PERIPHERAL CONFIG — config.txt + kernel modules
# --------------------------------------------------------------------------
# Lines appended to /boot/usercfg.txt on the FAT partition. The stock
# Alpine RPi config.txt includes usercfg.txt at the bottom, so additions
# layer cleanly without editing the shipped file. Use for HAT-specific
# enablement: dtoverlay= / dtparam= / enable_uart= / etc. One entry
# per list item, in the literal form the bootloader expects.
#
# Examples:
#   - dtparam=pciex1                # Pi 5 PCIe (e.g. for M.2 HAT+)
#   - dtparam=spi=on                # SPI bus for SPI-attached HATs
#   - dtoverlay=mcp2515-can0,oscillator=12000000,interrupt=25
#   - dtoverlay=disable-bt          # frees /dev/serial0 for RS485
#   - enable_uart=1                 # hardware UART (PL011)
#   - dtparam=i2c_arm=on            # I2C bus
#
# See examples/pi-5-can-rs485.yaml for a full HAT recipe.

# config_txt:
#   - dtparam=spi=on
#   - dtoverlay=mcp2515-can0,oscillator=12000000,interrupt=25,spimaxfrequency=2000000

# Kernel modules to force loaded at boot — written to /etc/modules in
# the apkovl, one per line, in declared order. Most modules autoload
# via udev once a matching dtoverlay is in place; this is the override
# for cards that need an explicit modprobe before their runlevel.

# modules:
#   - mcp251x
#   - can_dev
