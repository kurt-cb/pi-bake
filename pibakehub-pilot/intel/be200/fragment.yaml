# pibakehub fragment — schema v1
# Hand-authored from the v0.2 air-gap apk-fetch bake
# (pi-5 + alpine edge + waveshare m2-hat-plus + Intel BE200).
# VERIFIED on hardware — see verified_on: below.

schema_version: 1
vendor: intel
slug: be200
display_name: "Intel BE200 Wi-Fi 7 + BT 5.4 (M.2 2230 E-Key)"
manufacturer_url: https://www.intel.com/content/www/us/en/products/sku/230078/intel-wifi-7-be200/specifications.html
description: |
  Intel BE200 Wi-Fi 7 + Bluetooth 5.4 module (M.2 2230 E-Key).
  When plugged into a Pi 5 PCIe M.2 HAT (M-Key adapter or
  E-to-M passthrough), provides 802.11be on the Pi. Requires
  the iwlwifi kernel driver + firmware blobs, both present in
  Alpine `linux-firmware-intel` (firmware) and Alpine edge's
  `linux-rpi-6.12.85+` modloop (driver — STRIPPED from stable
  3.21's linux-rpi-6.12.13).
tags:
  - wifi
  - wifi-7
  - bluetooth
  - intel
  - iwlwifi
  - m2
  - pi-5

requires:
  oneof_boards:
    - pi-5
  os: alpine
  os_version_min: edge                  # 3.21's linux-rpi strips
                                        # wireless/intel/; only edge ships it

# No config.txt edits — assumes the HAT (separately composed,
# e.g. waveshare/m2-hat-plus) already enabled PCIe.
config_txt: []

modules:
  - iwlwifi
  - iwlmvm

packages:
  - linux-firmware-intel                # iwlwifi-gl-c0-fm-c0-* +
                                        # iwlwifi-sc-a0-fm-c0-* blobs

caveats: |
  - DOES NOT work on Alpine stable (3.21.x). The stable
    linux-rpi-6.12.13 modloop strips the entire
    wireless/intel/ kmod subtree even though bcm2711_defconfig
    declares CONFIG_IWLWIFI=m. Edge's linux-rpi-6.12.85 has it.
  - Bring this fragment WITH a HAT fragment that enables PCIe.
    Standalone, the BE200 needs PCIe + the M.2 slot wired in.
    Example compositions:
      --pibakehub waveshare/m2-hat-plus  --pibakehub intel/be200
      --pibakehub pimoroni/nvme-base     --pibakehub intel/be200
  - With pi-bake's v0.2 `apk_fetch: true`, the firmware blob
    (~200 MB of linux-firmware-intel) is fetched at bake time
    and installed offline on first boot. The image grows by
    that much.
  - 6 GHz / Wi-Fi 7 access requires regulatory domain set
    correctly. `wifi.country: US` (or wherever) in the recipe.

see_also:
  - https://wireless.wiki.kernel.org/en/users/drivers/iwlwifi
  - https://www.intel.com/content/www/us/en/support/articles/000022239/wireless.html

verified_on:
  - board: pi-5
    os: alpine
    os_version: edge
    components_present: []              # standalone (no HAT-fragment
                                        # in the bake, even though
                                        # operator had Waveshare M.2
                                        # HAT in hand)
    components_absent: []
    verified_by: kurt-cb
    verified_date: 2026-05-25
    image_sha256: ""                    # not recorded; bake was a
                                        # smoke-test of the v0.2
                                        # apk-fetch flow
    notes: |
      Bake verified — `pi-5-be200-edge.yaml` with
      `apk_fetch: true` produced a 211 MB image containing 63
      .apk files (linux-firmware-intel + recursive deps), and
      the offline first-boot install script generated correctly
      (apk add --no-network --allow-untrusted against the FAT-
      staged extras). Hardware-side iwlwifi attachment + BE200
      enumeration NOT yet verified (no BE200 + m2-hat-plus
      physical setup tested at the time of this record).

# No `provenance:` block — this fragment is hand-authored, not
# scraped. Its origin is the v0.2 pi-bake commit + the manual
# pi-5-be200-edge.yaml example recipe.
